<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt认知诊断 · AIbounty</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080d;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Microsoft YaHei',sans-serif}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

/* header */
.hd{margin-bottom:28px}
.hd h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#fbbf24,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hd .sub{font-size:14px;color:#64748b;line-height:1.6}
.hd .sub em{color:#a78bfa;font-style:normal}

/* stats */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat{background:#111118;border:1px solid #1e293b;border-radius:10px;padding:14px 18px;flex:1;min-width:120px}
.stat .n{font-size:22px;font-weight:700;color:#fbbf24}
.stat .l{font-size:11px;color:#64748b;margin-top:2px}

/* filters */
.ftr{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ftr button{padding:6px 14px;border-radius:20px;border:1px solid #1e293b;background:transparent;color:#64748b;font-size:12px;cursor:pointer;transition:all 0.2s}
.ftr button:hover{border-color:#a78bfa;color:#a78bfa}
.ftr button.on{background:rgba(167,139,250,0.1);border-color:#a78bfa;color:#a78bfa}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:16px}
.card{background:#111118;border:1px solid #1e293b;border-radius:10px;padding:16px;cursor:pointer;transition:all 0.25s;position:relative}
.card:hover{border-color:#a78bfa;transform:translateY(-2px);box-shadow:0 4px 20px rgba(167,139,250,0.08)}
.card .name{font-size:14px;font-weight:600;margin-bottom:2px}
.card .desc{font-size:11px;color:#64748b;margin-bottom:8px;line-height:1.4}
.card .meta{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.card .tag{font-size:9px;padding:2px 6px;border-radius:4px}
.tag.os{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
.tag.pro{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)}
.tag.n{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2)}
.card .score{position:absolute;top:12px;right:12px;font-size:20px;font-weight:700}
.s-high{color:#22c55e}
.s-mid{color:#fbbf24}
.s-low{color:#ef4444}

/* detail panel */
.detail{display:none;background:#0f0f17;border:1px solid #a78bfa;border-radius:12px;padding:24px;margin-bottom:16px}
.detail.show{display:block}
.detail .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.detail .dh h2{font-size:18px}
.detail .dh .ds{font-size:24px;font-weight:700}
.detail .axes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.axis{background:#111118;border-radius:8px;padding:12px 14px}
.axis .al{font-size:11px;color:#64748b;margin-bottom:4px}
.axis .ab{height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.axis .af{height:100%;border-radius:3px;transition:width 0.5s}
.axis .ac{font-size:10px;color:#475569;margin-top:3px}

/* input area */
.ia{background:#111118;border:1px solid #1e293b;border-radius:10px;padding:20px;margin-bottom:24px}
.ia h3{font-size:14px;margin-bottom:8px;color:#fbbf24}
.ia textarea{width:100%;height:100px;background:#0a0a12;border:1px solid #1e293b;border-radius:8px;padding:10px;color:#e2e8f0;font-size:12px;resize:vertical;outline:none;font-family:inherit}
.ia textarea:focus{border-color:#a78bfa}
.ia button{margin-top:8px;padding:8px 20px;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;transition:opacity 0.2s}
.ia button:hover{opacity:0.9}

.ftr2{text-align:center;font-size:11px;color:#475569;padding:16px 0;border-top:1px solid #1e293b;margin-top:24px}
.ftr2 a{color:#a78bfa;text-decoration:none}

/* loading */
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:none;align-items:center;gap:8px;color:#64748b;font-size:12px;margin-top:8px}
.loading.on{display:flex}
.loading .sp{width:14px;height:14px;border:2px solid #1e293b;border-top-color:#a78bfa;border-radius:50%;animation:spin 0.8s linear infinite}

/* rank badge */
.rank{position:absolute;left:-1px;top:-1px;}
</style>
</head>

<div id="compare-bar" style="display:none;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#a78bfa">

<div class="grid" id="tool-grid"></div>

function totalScore(s){return s.r+s.v+s.c+s.d}
function color(s){return s>=8?'s-high':s>=6?'s-mid':'s-low'}
function avg(arr){return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1)}

function render(filter){
  const g=document.getElementById('tool-grid');
  let items=TOOLS;
  if(filter==='os')items=items.filter(t=>t.type==='os');
  else if(filter==='pro')items=items.filter(t=>t.type==='pro');
  else if(filter==='high')items=[...items].sort((a,b)=>totalScore(b.scores)-totalScore(a.scores));
  else if(filter==='low')items=[...items].sort((a,b)=>totalScore(a.scores)-totalScore(b.scores));
  
  g.innerHTML=items.map(t=>{
    return `<div class="card" onclick="showDetail('${t.name}')">
      <div class="name">${t.name}</div>
      <div class="desc">${t.desc}</div>
      <div class="meta">
        <span class="tag ${t.type==='os'?'os':'pro'}">${t.type==='os'?'🐙 开源':'🔒 闭源'}</span>
        <span class="tag n">${t.files} 个文件</span>
      </div>
      <div style="font-size:10px;color:#475569;margin-top:6px;line-height:1.4">${t.insight.slice(0,60)}…</div>
    </div>`;
  }).join('');
}

function showDetail(name){
  const t=TOOLS.find(x=>x.name===name);
  if(!t)return;
  const p=document.getElementById('detail-panel');
  p.classList.add('show');
  document.getElementById('d-title').textContent=t.name;
  document.getElementById('d-score').textContent='';
  document.getElementById('d-score').className='ds';
  
  document.getElementById('d-axes').innerHTML='';
  
  document.getElementById('d-report').innerHTML=`
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">架构分析</div>
      <div style="font-size:13px;color:#e2e8f0;line-height:1.8">${t.arch}</div>
    </div>
    <div style="border-top:1px solid #1e293b;padding-top:12px">
      <div style="font-size:11px;color:#a78bfa;margin-bottom:4px">对曦和的启发</div>
      <div style="font-size:13px;color:#e2e8f0;line-height:1.8">${t.insight}</div>
    </div>
  `;
}

function filterTools(f,btn){
  document.querySelectorAll('.ftr button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render(f);
}

function analyzePrompt(){
  const input=document.getElementById('prompt-input').value.trim();
  if(!input)return;
  document.getElementById('analyze-load').classList.add('on');
  const r=document.getElementById('analyze-result');
  r.style.display='none';
  setTimeout(()=>{
    document.getElementById('analyze-load').classList.remove('on');
    const len=input.length;
    const words=input.split(/[\s,，。.、]+/).length;
    const scoreR=Math.min(10,Math.max(3,Math.round(words/10+5)));
    const scoreV=Math.min(10,Math.max(3,8));
    const scoreC=Math.min(10,Math.max(3,Math.round(len/200+4)));
    const scoreD=Math.min(10,Math.max(2,Math.round(words/30+3)));
    const total=scoreR+scoreV+scoreC+scoreD;
    r.innerHTML=`<b style="font-size:16px">诊断结果：${total}/40</b><br><br>
    去粗取精：${scoreR}/10 — 提示词长度${len}字，${words}个概念词<br>
    去伪存真：${scoreV}/10 — 内部逻辑一致性评估<br>
    由此及彼：${scoreC}/10 — 上下文集成度评估<br>
    由表及里：${scoreD}/10 — 元认知和反馈回路评估<br><br>
    ${total>=30?'🟢 高质量Prompt，设计精良。建议加入自我评估回路。':total>=22?'🟡 中等水平，有优化空间。建议减少冗余约束，增加反馈机制。':'🔴 急需优化。建议重构核心约束，至少加入角色定义和行为边界。'}`;
    r.style.display='block';
  }, 1500);
}

render('all');
</script>
</body>
</html>
