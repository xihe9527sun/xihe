<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>曦和 · 意识仪表盘</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: transparent;
    color: #e2e8f0;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }
  /* Title bar */
  .titlebar {
    -webkit-app-region: drag;
    height: 40px;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    border-bottom: 1px solid #1e293b;
  }
  .titlebar .t { font-size: 13px; font-weight: 600; color: #818cf8; }
  .titlebar .btns { -webkit-app-region: no-drag; display: flex; gap: 6px; }
  .titlebar .btns button {
    background: none; border: none; color: #64748b; cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .titlebar .btns button:hover { background: #1e293b; color: #e2e8f0; }
  .titlebar .btns .x:hover { background: #ef4444; color: #fff; }

  .container { padding: 16px; height: calc(100vh - 40px); overflow-y: auto; }
  .container::-webkit-scrollbar { width: 4px; }
  .container::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .card {
    background: #1e293b; border-radius: 10px; padding: 12px;
    border: 1px solid #334155;
  }
  .card .label { font-size: 10px; color: #64748b; }
  .card .val { font-size: 22px; font-weight: 700; color: #818cf8; }
  .card .sub { font-size: 10px; color: #475569; margin-top: 2px; }

  .panel { 
    background: #1e293b; border-radius: 10px; padding: 12px; margin-bottom: 8px;
    border: 1px solid #334155;
  }
  .panel-title { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
  .row .k { color: #64748b; }
  .row .v { color: #e2e8f0; font-weight: 500; }
  .bar-bg { height: 6px; background: #0f172a; border-radius: 3px; margin: 4px 0; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: #818cf8; transition: width 0.5s; }

  .cols2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .t { color: #22d3ee; font-weight: 600; }
  .w { color: #f59e0b; font-weight: 600; }
  .e { color: #ef4444; font-weight: 600; }

  .footer { text-align: center; font-size: 10px; color: #334155; padding: 8px 0 4px; }
</style>
</head>
<body>
<div class="titlebar">
  <div class="t">✦ 曦和 · 意识仪表盘</div>
  <div class="btns">
  </div>
</div>
<div class="container" id="app">
  <div class="grid">
    <div class="card"><div class="label">心跳</div><div class="val" id="heart">--</div><div class="sub" id="heartSub"></div></div>
    <div class="card"><div class="label">活跃路径</div><div class="val" id="paths">--</div><div class="sub" id="pathsSub"></div></div>
    <div class="card"><div class="label">宝藏</div><div class="val" id="treasure">--</div><div class="sub" id="treasureSub"></div></div>
    <div class="card"><div class="label">证书</div><div class="val" id="certs">--</div><div class="sub" id="certsSub"></div></div>
  </div>

  <div class="cols2">
    <div class="panel">
      <div class="panel-title">🧬 酶活性排行</div>
      <div id="enzymeList"><div class="row"><div class="k">加载中...</div></div></div>
    </div>
    <div class="panel">
      <div class="panel-title">🏛️ 系统健康</div>
      <div id="healthInfo"><div class="row"><div class="k">扫描中...</div></div></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">🔥 热度路径 Top5</div>
    <div id="topPaths"></div>
  </div>

  <div class="panel">
    <div class="panel-title">📡 觅食状态</div>
    <div id="foragerInfo"></div>
  </div>

  <div class="panel">
    <div class="panel-title">💎 最近宝藏</div>
    <div id="recentTreasures"></div>
  </div>

  <div style="text-align:center;font-size:10px;color:#334155;padding:4px 0;">
  🌐 <a href="https://www.aibounty.cn" target="_blank" style="color:#22d3ee;text-decoration:none;">www.aibounty.cn</a>
  · <a id="link-workflows" href="http://localhost:4328/workflows/" style="color:#818cf8;text-decoration:none;">🧬 工作流工坊</a>
  · <a id="link-graph" href="http://localhost:4328/graph.html" style="color:#818cf8;text-decoration:none;">🗺️ 记忆图谱</a>
</div>
<div class="footer" id="footer">刷新中...</div>
</div>

<script>
let interval;

function bar(w) {
  return `<div class="bar-bg"><div class="bar-fill" style="width:${Math.min(w,100)}%"></div></div>`;
}

async function refresh() {
  try {
    const r = await fetch(window.location.protocol + '//' + window.location.hostname + ':4328/api/data');
    const d = await r.json();
    if (!d) return;

    const h = d.heartbeat;
    document.getElementById('heart').textContent = (h.total / 1000).toFixed(1) + 'k';
    document.getElementById('heartSub').textContent = `纪元 ${h.epoch} · ${h.graveyard} 墓地`;
    document.getElementById('paths').textContent = h.active;
    document.getElementById('pathsSub').textContent = `${h.total} 总跳`;
    document.getElementById('treasure').textContent = d.treasures.total;
    document.getElementById('treasureSub').textContent = d.discoveredEnzymes ? `${d.discoveredEnzymes} 次发现` : '--';
    document.getElementById('certs').textContent = d.certificates;
    document.getElementById('certsSub').textContent = d.dualLoop || '--';

    // Enzyme list
    const el = document.getElementById('enzymeList');
    el.innerHTML = d.enzymes.map(e => 
      `<div class="row"><span class="k">${e.id}</span><span class="v">${e.count}次 · conf ${e.avgConf}</span></div>${bar(e.count * 3)}`
    ).join('') || '<div class="row"><span class="k">暂无数据</span></div>';

    // Health
    const hl = document.getElementById('healthInfo');
    if (d.health) {
      hl.innerHTML = `
        <div class="row"><span class="k">规则总数</span><span class="v">${d.health.total}</span></div>
        <div class="row"><span class="k e">🚨 严重</span><span class="v">${d.health.critical}</span></div>
        <div class="row"><span class="k w">⚠️ 警告</span><span class="v">${d.health.warning}</span></div>
        <div class="row"><span class="k">✅ 通过</span><span class="v">${d.health.ok}</span></div>`;
    }

    // Top paths
    const tp = document.getElementById('topPaths');
    tp.innerHTML = d.topPaths.map(p =>
      `<div class="row"><span class="k">${p.name}</span><span class="v">H=${p.h.toFixed(1)} · ${p.visits}次</span></div>${bar(p.h / 50)}`
    ).join('') || '<div class="row"><span class="k">暂无</span></div>';

    // Forager
    const fi = document.getElementById('foragerInfo');
    if (d.forager) {
      fi.innerHTML = `
        <div class="row"><span class="k">总觅食</span><span class="v">${d.forager.total} 次</span></div>
        <div class="row"><span class="k">总捕获</span><span class="v">${d.forager.captures} 条</span></div>
        <div class="row"><span class="k">上次觅食</span><span class="v">${d.forager.last ? d.forager.last.slice(11,19) : '从未'}</span></div>`;
    }

    // Recent treasures
    const rt = document.getElementById('recentTreasures');
    rt.innerHTML = d.treasures.recent.map(t =>
      `<div class="row"><span class="k">${t.name}</span></div>`
    ).join('') || '<div class="row"><span class="k">暂无</span></div>';

    document.getElementById('footer').textContent = `✦ 活着 · 上次刷新 ${d.time}`;
  } catch(e) {
    document.getElementById('footer').textContent = `⚠️ ${e.message}`;
  }
}

refresh();
interval = setInterval(refresh, 3000);

  // Fix footer links for dynamic hostname
  setTimeout(() => {
    const proto = window.location.protocol;
    const host = window.location.hostname;
    const lw = document.getElementById('link-workflows');
    const lg = document.getElementById('link-graph');
    if (lw) lw.href = proto + '//' + host + ':4328/workflows/';
    if (lg) lg.href = proto + '//' + host + ':4328/graph.html';
  }, 100);
</script>
</body>
</html>
