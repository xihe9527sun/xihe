      function updateConnectionLine(currentBubble) {
        // 找到当前气泡的圆点
        const currentDot = currentBubble.querySelector('.bubble-dot.connect-to-prev');
        if (!currentDot) return;

        // 找到上一个气泡
        const prevBubble = currentBubble.previousElementSibling;
        if (!prevBubble) return;

        // 找到上一个气泡的圆点
        const prevDot = prevBubble.querySelector('.bubble-dot');
        if (!prevDot) return;

        // 计算两个圆点之间的距离
        const currentRect = currentDot.getBoundingClientRect();
        const prevRect = prevDot.getBoundingClientRect();
        const distance = currentRect.top - prevRect.bottom;

        // 设置连接线高度（加上圆点的半径补偿）
        if (distance > 0) {
          currentDot.style.setProperty('--line-height', `${distance}px`);
        }
      }

      function updateAllConnectionLines() {
        const bubbles = messages.querySelectorAll('.bubble');
        bubbles.forEach(bubble => {
          updateConnectionLine(bubble);
        });
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function normalizeAskPermissions(value) {
        if (!Array.isArray(value)) {
          return [];
        }
        return value
          .map((item) => {
            if (!item || typeof item !== "object") {
              return null;
            }
            const toolCallId = typeof item.toolCallId === "string" ? item.toolCallId : "";
            const name = typeof item.name === "string" ? item.name : "Tool";
            const command = typeof item.command === "string" ? item.command : "";
            const description = typeof item.description === "string" ? item.description : "";
            const scopes = Array.isArray(item.scopes)
              ? item.scopes.filter((scope) => typeof scope === "string" && scope.length > 0)
              : [];
            if (!toolCallId) {
              return null;
            }
            return {
              toolCallId,
              name,
              command,
              description,
              scopes: scopes.length > 0 ? scopes : ["unknown"]
            };
          })
          .filter(Boolean);
      }

      function buildPermissionScopePrompts(requests) {
        const prompts = [];
        requests.forEach((request) => {
          const scopes = request.scopes && request.scopes.length > 0 ? request.scopes : ["unknown"];
          scopes.forEach((scope) => {
            prompts.push({ request, scope });
          });
        });
        return prompts;
      }

      function isAlwaysAllowedScope(scope) {
        return [
          "read-in-cwd",
          "read-out-cwd",
          "write-in-cwd",
          "write-out-cwd",
          "delete-in-cwd",
          "delete-out-cwd",
          "query-git-log",
          "mutate-git-log",
          "network",
          "mcp"
        ].includes(scope);
      }

      function describePermissionScope(scope) {
        switch (scope) {
          case "read-in-cwd":
            return "reads inside this workspace";
          case "read-out-cwd":
            return "reads outside this workspace";
          case "write-in-cwd":
            return "writes inside this workspace";
          case "write-out-cwd":
            return "writes outside this workspace";
          case "delete-in-cwd":
            return "deletes inside this workspace";
          case "delete-out-cwd":
            return "deletes outside this workspace";
          case "query-git-log":
            return "Git history queries";
          case "mutate-git-log":
            return "Git history changes";
          case "network":
            return "network access";
          case "mcp":
            return "MCP tool access";
          default:
            return "unknown access";
        }
      }

      function getPermissionRiskClass(scope) {
        switch (scope) {
          case "read-in-cwd":
          case "query-git-log":
            return "risk-low";
          case "read-out-cwd":
          case "write-in-cwd":
          case "network":
          case "mcp":
            return "risk-medium";
          default:
            return "risk-high";
        }
      }

      function samePermissionRequests(left, right) {
        return JSON.stringify(left || []) === JSON.stringify(right || []);
      }

      function ensurePermissionPromptState(requests) {
        const normalizedRequests = normalizeAskPermissions(requests);
        if (
          permissionPromptState &&
          samePermissionRequests(permissionPromptState.requests, normalizedRequests)
        ) {
          return permissionPromptState;
        }
        permissionPromptState = {
          requests: normalizedRequests,
          prompts: buildPermissionScopePrompts(normalizedRequests),
          index: 0,
          decisions: {},
          alwaysAllows: [],
          submitting: false
        };
        return permissionPromptState;
      }

      function findNextPermissionPromptIndex(state) {
        let index = state.index;
        while (index < state.prompts.length) {
          const scope = state.prompts[index].scope;
          if (isAlwaysAllowedScope(scope) && state.alwaysAllows.includes(scope)) {
            index += 1;
            continue;
          }
          return index;
        }
        return state.prompts.length;
      }

      function buildPermissionResult(state) {
        const permissions = state.requests.map((request) => ({
          toolCallId: request.toolCallId,
          permission: state.decisions[request.toolCallId] === "deny" ? "deny" : "allow"
        }));
        return {
          permissions,
          alwaysAllows: state.alwaysAllows.slice(),
          hasDeny: permissions.some((permission) => permission.permission === "deny")
        };
      }

      function submitPermissionResult(result) {
        permissionPromptState = null;
        currentAskPermissions = [];
        if (result.hasDeny) {
          pendingPermissionReply = {
            permissions: result.permissions,
            alwaysAllows: result.alwaysAllows
          };
          currentSessionStatus = "permission_denied";
          vscode.postMessage({
            type: "denyPermission",
            sessionId: currentSessionId
          });
          renderPermissionPrompt();
          updateSendIconState();
          return;
        }

        pendingPermissionReply = null;
        renderPermissionPrompt();
        sendUserPromptText("/continue", undefined, [], {
          permissions: result.permissions,
          alwaysAllows: result.alwaysAllows,
          skipHistory: true
        });
      }

      function commitPermissionDecision(kind) {
        if (!permissionPromptState || permissionPromptState.submitting) {
          return;
        }
        const state = permissionPromptState;
        const promptIndex = findNextPermissionPromptIndex(state);
        const prompt = state.prompts[promptIndex];
        if (!prompt) {
          state.submitting = true;
          submitPermissionResult(buildPermissionResult(state));
          return;
        }

        if (kind === "always" && isAlwaysAllowedScope(prompt.scope)) {
          if (!state.alwaysAllows.includes(prompt.scope)) {
            state.alwaysAllows.push(prompt.scope);
          }
          if (state.decisions[prompt.request.toolCallId] !== "deny") {
            state.decisions[prompt.request.toolCallId] = "allow";
          }
        } else {
          state.decisions[prompt.request.toolCallId] =
            kind === "deny" ? "deny" : state.decisions[prompt.request.toolCallId] === "deny" ? "deny" : "allow";
        }

        state.index = promptIndex + 1;
        renderPermissionPrompt();
      }

      function cancelPermissionPrompt() {
        permissionPromptState = null;
        currentAskPermissions = [];
        currentSessionStatus = "interrupted";
        pendingPermissionReply = null;
        vscode.postMessage({ type: "interrupt" });
        renderPermissionPrompt();
        setLoading(false, currentSessionStatus);
      }

      function renderPermissionDeniedNotice() {
        permissionPromptHost.innerHTML = `
          <div class="permission-card permission-denied-card">
            <div class="permission-title">Permission denied</div>
            <div class="permission-description">Add a reply, then press Enter to continue with the denial.</div>
          </div>
        `;
        permissionPromptHost.hidden = false;
      }

      function renderPermissionPrompt() {
        if (!permissionPromptHost) {
          return;
        }
        if (pendingPermissionReply && currentSessionStatus === "permission_denied") {
          renderPermissionDeniedNotice();
          return;
        }
        if (currentSessionStatus !== "ask_permission" || currentAskPermissions.length === 0) {
          permissionPromptHost.innerHTML = "";
          permissionPromptHost.hidden = true;
          permissionPromptState = null;
          return;
        }

        const state = ensurePermissionPromptState(currentAskPermissions);
        const promptIndex = findNextPermissionPromptIndex(state);
        const prompt = state.prompts[promptIndex];
        if (!prompt) {
          state.submitting = true;
          submitPermissionResult(buildPermissionResult(state));
          return;
        }

        const request = prompt.request;
        const scopeDescription = describePermissionScope(prompt.scope);
        const riskClass = getPermissionRiskClass(prompt.scope);
        const canAlwaysAllow = isAlwaysAllowedScope(prompt.scope);

        permissionPromptHost.innerHTML = "";
        permissionPromptHost.hidden = false;

        const card = document.createElement("div");
        card.className = "permission-card";
        card.innerHTML = `
          <div class="permission-header">
            <div>
              <div class="permission-title">Permission required</div>
              <div class="permission-progress">${promptIndex + 1}/${state.prompts.length}</div>
            </div>
            <button type="button" class="permission-close" title="Interrupt">×</button>
          </div>
          <div class="permission-tool">${escapeHtml(request.name)}</div>
          <div class="permission-command">${escapeHtml(request.command || "(no command)")}</div>
          ${request.description ? `<div class="permission-description">${escapeHtml(request.description)}</div>` : ""}
          <div class="permission-scope ${riskClass}">${escapeHtml(scopeDescription)}</div>
          <div class="permission-question">Do you want to proceed?</div>
          <div class="permission-actions">
            <button type="button" class="permission-action permission-allow">Yes</button>
            ${
              canAlwaysAllow
                ? `<button type="button" class="permission-action permission-always">Yes, and always allow this scope</button>`
                : ""
            }
            <button type="button" class="permission-action permission-deny">No</button>
          </div>
        `;

        card.querySelector(".permission-close")?.addEventListener("click", cancelPermissionPrompt);
        card.querySelector(".permission-allow")?.addEventListener("click", () => commitPermissionDecision("allow"));
        card.querySelector(".permission-always")?.addEventListener("click", () => commitPermissionDecision("always"));
        card.querySelector(".permission-deny")?.addEventListener("click", () => commitPermissionDecision("deny"));

        permissionPromptHost.appendChild(card);
      }

      function renderStructuredToolResult(toolData, container) {
        if (!toolData || toolData.ok !== true) {
          return false;
        }

        const toolName = String(toolData.name || "").toLowerCase();
        if (toolName === "updateplan") {
          return renderUpdatePlanResult(toolData, container);
        }

        if (toolName !== "edit" && toolName !== "write") {
          return false;
        }

        const metadata = toolData.metadata && typeof toolData.metadata === "object"
          ? toolData.metadata
          : null;
        if (!metadata || typeof metadata.file_path !== "string") {
          return false;
        }

        const details = document.createElement("div");
        details.className = "tool-result-details";

        if (typeof toolData.output === "string" && toolData.output.trim()) {
          const summary = document.createElement("div");
          summary.className = "tool-result-summary";
          summary.textContent = toolData.output.trim();
          details.appendChild(summary);
        }

        const fileRow = document.createElement("div");
        fileRow.className = "tool-result-file-row";

        const fileLabel = document.createElement("span");
        fileLabel.className = "tool-result-label";
        fileLabel.textContent = "File";
        fileRow.appendChild(fileLabel);

        const fileButton = document.createElement("button");
        fileButton.type = "button";
        fileButton.className = "tool-result-filepath";
        fileButton.textContent = formatDisplayPath(metadata.file_path);
        fileButton.title = metadata.file_path;
        fileButton.addEventListener("click", (event) => {
          event.stopPropagation();
          const targetLine = metadata.scope && typeof metadata.scope.start_line === "number"
            ? metadata.scope.start_line
            : 1;
          vscode.postMessage({
            type: "openFile",
            filePath: metadata.file_path,
            line: targetLine
          });
        });
        fileRow.appendChild(fileButton);
        details.appendChild(fileRow);

        if (typeof metadata.diff_preview === "string" && metadata.diff_preview.trim()) {
          const diffBlock = renderDiffPreview(metadata.diff_preview);
          if (diffBlock) {
            details.appendChild(diffBlock);
          }
        }

        container.appendChild(details);
        return true;
      }

      function renderUpdatePlanResult(toolData, container) {
        const metadata = toolData.metadata && typeof toolData.metadata === "object"
          ? toolData.metadata
          : null;
        const plan = typeof metadata?.plan === "string" ? metadata.plan.trim() : "";
        if (!plan) {
          return false;
        }

        const planBlock = document.createElement("div");
        planBlock.className = "update-plan-result update-plan-markdown";
        renderPlanMarkdown(plan, planBlock);

        container.appendChild(planBlock);
        return true;
      }

      function renderPlanMarkdown(markdown, container) {
        const lines = String(markdown || "").split(/\r?\n/);
        lines.forEach((line) => {
          const raw = line.replace(/\s+$/, "");
          if (!raw.trim()) {
            const spacer = document.createElement("div");
            spacer.className = "update-plan-spacer";
            container.appendChild(spacer);
            return;
          }

          const headingMatch = raw.match(/^(#{1,6})\s+(.+)$/);
          if (headingMatch) {
            const level = Math.min(6, headingMatch[1].length);
            const heading = document.createElement(`h${level}`);
            heading.className = "update-plan-heading";
            appendInlineMarkdown(heading, headingMatch[2].trim());
            container.appendChild(heading);
            return;
          }

          const taskMatch = raw.match(/^(\s*)[-*]\s+\[([ xX!>])\]\s*(.*)$/);
          if (taskMatch) {
            const indent = getMarkdownIndentLevel(taskMatch[1]);
            const status = normalizePlanStatus(taskMatch[2]);
            const row = document.createElement("div");
            row.className = `update-plan-task status-${status}`;
            row.style.setProperty("--plan-indent", String(indent));

            const marker = document.createElement("span");
            marker.className = "update-plan-status";
            marker.textContent = getPlanStatusLabel(status);
            row.appendChild(marker);

            const text = document.createElement("span");
            text.className = "update-plan-task-text";
            appendInlineMarkdown(text, taskMatch[3].trim());
            row.appendChild(text);

            container.appendChild(row);
            return;
          }

          const bulletMatch = raw.match(/^(\s*)[-*]\s+(.+)$/);
          if (bulletMatch) {
            const row = document.createElement("div");
            row.className = "update-plan-bullet";
            row.style.setProperty("--plan-indent", String(getMarkdownIndentLevel(bulletMatch[1])));
            const marker = document.createElement("span");
            marker.className = "update-plan-bullet-marker";
            marker.textContent = "•";
            row.appendChild(marker);
            const text = document.createElement("span");
            appendInlineMarkdown(text, bulletMatch[2].trim());
            row.appendChild(text);
            container.appendChild(row);
            return;
          }

          const paragraph = document.createElement("p");
          paragraph.className = "update-plan-paragraph";
          appendInlineMarkdown(paragraph, raw.trim());
          container.appendChild(paragraph);
        });
      }

      function getMarkdownIndentLevel(indent) {
        return Math.floor(String(indent || "").replace(/\t/g, "  ").length / 2);
      }

      function normalizePlanStatus(value) {
        if (value === "x" || value === "X") return "done";
        if (value === ">") return "active";
        if (value === "!") return "attention";
        return "todo";
      }

      function getPlanStatusLabel(status) {
        if (status === "done") return "✓";
        if (status === "active") return ">";
        if (status === "attention") return "!";
        return "";
      }

      function appendInlineMarkdown(parent, text) {
        parent.innerHTML = renderInlineMarkdown(text);
      }

      function renderInlineMarkdown(text) {
        return escapeHtml(String(text || ""))
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>");
      }

      function formatDisplayPath(filePath) {
        if (!filePath) {
          return "";
        }

        if (workspaceRoot && isPathInsideWorkspace(filePath, workspaceRoot)) {
          const relative = getRelativePath(filePath, workspaceRoot);
          if (relative) {
            return relative;
          }
        }

        return filePath;
      }

      function isPathInsideWorkspace(filePath, rootPath) {
        const normalizedFile = normalizePath(filePath);
        const normalizedRoot = normalizePath(rootPath);
        return normalizedFile === normalizedRoot || normalizedFile.startsWith(`${normalizedRoot}/`);
      }

      function getRelativePath(filePath, rootPath) {
        const normalizedFile = normalizePath(filePath);
        const normalizedRoot = normalizePath(rootPath);
        if (!normalizedFile.startsWith(normalizedRoot)) {
          return filePath;
        }
        return normalizedFile.slice(normalizedRoot.length).replace(/^\/+/, "");
      }

      function normalizePath(value) {
        return String(value || "").replace(/\\/g, "/").replace(/\/+$/, "");
      }

      function renderDiffPreview(diffPreview) {
        const lines = String(diffPreview || "").split("\n");
        const meaningfulLines = lines.filter((line) => {
          return !line.startsWith("--- ") &&
            !line.startsWith("+++ ") &&
            !line.startsWith("@@ ");
        });

        if (meaningfulLines.length === 0) {
          return null;
        }

        const section = document.createElement("div");
        section.className = "tool-result-diff";

        const label = document.createElement("div");
        label.className = "tool-result-label";
        label.textContent = "Changes";
        section.appendChild(label);

        const list = document.createElement("div");
        list.className = "diff-preview";

        meaningfulLines.forEach((line) => {
          if (!line) {
            return;
          }

          const row = document.createElement("div");
          row.className = "diff-line";

          const marker = document.createElement("span");
          marker.className = "diff-line-marker";
          marker.textContent = line[0] === "+" || line[0] === "-" ? line[0] : " ";

          const content = document.createElement("span");
          content.className = "diff-line-content";
          content.textContent = line.slice(1);

          if (line.startsWith("+")) {
            row.classList.add("added");
          } else if (line.startsWith("-")) {
            row.classList.add("removed");
          } else {
            row.classList.add("context");
          }

          row.appendChild(marker);
          row.appendChild(content);
          list.appendChild(row);
        });

        section.appendChild(list);
        return section;
      }

      function addToolParamsTooltip(element) {
        const tooltipText = element.dataset.tip;
        if (!tooltipText) return;

        let tooltip = null;
        let showTimer = null;

        function updateTooltipPosition() {
          if (!tooltip) return;
          const rect = element.getBoundingClientRect();
          tooltip.style.left = rect.left + 'px';
          tooltip.style.top = (rect.bottom + 10) + 'px';
        }

        element.addEventListener('mouseenter', () => {
          // 清除旧的延迟任务
          if (showTimer) {
            clearTimeout(showTimer);
          }

          // 延迟 500ms 后显示 tooltip
          showTimer = setTimeout(() => {
            if (tooltip) {
              tooltip.remove();
            }
            tooltip = document.createElement('div');
            tooltip.className = 'tooltip show';
            tooltip.textContent = tooltipText;
            document.body.appendChild(tooltip);

            // 下一帧时更新位置，确保元素已渲染
            requestAnimationFrame(() => {
              updateTooltipPosition();
            });

            // 监听窗口大小变化和滚动
            const handleUpdate = () => updateTooltipPosition();
            window.addEventListener('resize', handleUpdate);
            window.addEventListener('scroll', handleUpdate, true);

            const handleMouseLeave = () => {
              if (tooltip) {
                tooltip.remove();
                tooltip = null;
              }
              window.removeEventListener('resize', handleUpdate);
              window.removeEventListener('scroll', handleUpdate, true);
              element.removeEventListener('mouseleave', handleMouseLeave);
            };

            element.addEventListener('mouseleave', handleMouseLeave);
          }, 500);
        });

        element.addEventListener('mouseleave', () => {
          // 鼠标离开时清除延迟任务和 tooltip
          if (showTimer) {
            clearTimeout(showTimer);
            showTimer = null;
          }
          if (tooltip) {
            tooltip.remove();
            tooltip = null;
          }
        });
      }

      function formatElapsedTime(startTimeIso) {
        const startTime = new Date(startTimeIso).getTime();
        const elapsedMs = Date.now() - startTime;
        const elapsedSeconds = Math.floor(elapsedMs / 1000);
        const minutes = Math.floor(elapsedSeconds / 60);
        const seconds = elapsedSeconds % 60;
        if (minutes > 0) {
          return `${minutes}m${seconds}s`;
        }
        return `${seconds}s`;
      }

      let currentThinkingBubbleElement = null; // 当前 thinking 气泡 DOM 元素

      function getThinkingContentText() {
        if (currentRunningProcesses && Object.keys(currentRunningProcesses).length > 0) {
          const firstPid = Object.keys(currentRunningProcesses)[0];
          const process = currentRunningProcesses[firstPid];
          const elapsed = formatElapsedTime(process.startTime);
          return `(${elapsed}) ${process.command}`;
        }

        if (currentLlmStreamProgress && currentLlmStreamProgress.startedAt) {
          const startedAt = new Date(currentLlmStreamProgress.startedAt).getTime();
          const elapsedSeconds = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
          const formattedTokens = currentLlmStreamProgress.formattedTokens || "0";
          if (elapsedSeconds >= 3) {
            return `(${elapsedSeconds}s) · ↓ ${formattedTokens} tokens`;
          }
        }

        return "Processing...";
      }

      function updateThinkingBubbleContent() {
        if (!currentThinkingBubbleElement) return;
        const statusEl = currentThinkingBubbleElement.querySelector(".thinking-status");
        if (statusEl) {
          statusEl.textContent = getThinkingContentText();
        }
      }

      function removeThinkingBubble() {
        if (currentThinkingBubbleElement) {
          currentThinkingBubbleElement.remove();
          currentThinkingBubbleElement = null;
        }
      }

      function createThinkingBubble(shouldConnectToPrev) {
        removeThinkingBubble();

        const bubble = document.createElement("div");
        bubble.className = "bubble assistant";
        bubble.dataset.thinkingLive = "true";

        const header = document.createElement("div");
        header.className = "bubble-collapsible-header";

        const dotClass = shouldConnectToPrev ? "bubble-dot spinner-dot connect-to-prev" : "bubble-dot spinner-dot";
        const statusText = getThinkingContentText();
        header.innerHTML = `
          <span class="${dotClass}"></span>
          <span class="bubble-title">
            <span class="bubble-title-text"><b>Thinking</b> <span class="thinking-status">${escapeHtml(statusText)}</span></span>
          </span>
        `;

        bubble.appendChild(header);
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;

        currentThinkingBubbleElement = bubble;

        // 连接线
        if (shouldConnectToPrev) {
          requestAnimationFrame(() => {
            updateConnectionLine(bubble);
          });
        }
        requestAnimationFrame(() => {
          updateAllConnectionLines();
        });
      }

      function setLoading(isLoading, status) {
        if (status !== undefined) {
          currentSessionStatus = status;
        }
        if (!isLoading) {
          currentLlmStreamProgress = null;
        }

        // 清除旧的计时器
        if (loadingUpdateTimer !== null) {
          clearInterval(loadingUpdateTimer);
          loadingUpdateTimer = null;
        }

        if (isLoading) {
          // 创建 thinking bubble，连到上一条非 user 消息
          const shouldConnect = lastMessageRole !== null && lastMessageRole !== "user";
          createThinkingBubble(shouldConnect);
          loadingUpdateTimer = setInterval(updateThinkingBubbleContent, 1000);
        } else {
          removeThinkingBubble();
        }

        // 切换图标
        if (isLoading) {
          sendIcon.style.display = "none";
          stopIcon.style.display = "block";
          sendButton.title = "Stop";
        } else {
          sendIcon.style.display = "block";
          stopIcon.style.display = "none";
          sendButton.title = "Send";
        }

        updateSendIconState();
        updateAskUserQuestionInteractivity();
        renderPermissionPrompt();
      }

      function updateSendIconState() {
        const hasContent = promptInput.value.trim().length > 0 || getAttachedImageUrls().length > 0;
        if (!isProcessing()) {
          sendIcon.classList.toggle("empty", !hasContent);
          sendButton.disabled = false;
        } else {
          sendButton.disabled = false; // 允许点击中断
        }
      }

      function clearMessages() {
        messages.innerHTML = "";
        lastMessageRole = null;
      }

      function updateSessionDropdown(sessions) {
        allSessions = sessions || [];
        sessionDropdown.innerHTML = "";

        // 创建搜索框
        const searchBox = document.createElement("div");
        searchBox.className = "session-search-box";
        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.className = "session-search-input";
        searchInput.placeholder = "Search sessions...";
        searchBox.appendChild(searchInput);
        sessionDropdown.appendChild(searchBox);

        // 创建列表容器
        const listContainer = document.createElement("div");
        listContainer.className = "session-dropdown-list";
        sessionDropdown.appendChild(listContainer);

        // 保存引用
        sessionSearchInput = searchInput;
        sessionDropdownList = listContainer;

        // 渲染所有会话
        renderFilteredSessions("");

        // 添加搜索事件
        searchInput.addEventListener("input", (e) => {
          renderFilteredSessions(e.target.value);
        });

        // 阻止搜索框点击事件冒泡
        searchInput.addEventListener("click", (e) => {
          e.stopPropagation();
        });
      }

      function formatSessionDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const sessionDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

        // 计算天数差异
        const diffTime = today.getTime() - sessionDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) {
          return "Today";
        } else if (diffDays === 1) {
          return "Yesterday";
        } else if (diffDays >= 2 && diffDays <= 7) {
          // 显示具体的星期几
          const weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
          return weekdays[sessionDate.getDay()];
        } else {
          return null; // 超过7天，不显示
        }
      }

      function renderFilteredSessions(searchQuery) {
        if (!sessionDropdownList) return;

        sessionDropdownList.innerHTML = "";
        const query = searchQuery.toLowerCase().trim();

        // 过滤会话
        const filteredSessions = allSessions.filter((session) => {
          const summary = (session.summary || "Untitled").toLowerCase();
          return summary.includes(query);
        });

        // 获取今天的开始时间
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const lastWeek = new Date(today);
        lastWeek.setDate(lastWeek.getDate() - 7);

        // 按时间分组
        const groups = {
          today: [],
          yesterday: [],
          pastWeek: []
        };

        // 筛选并分组会话
        filteredSessions.forEach((session) => {
          const sessionDate = new Date(session.updateTime);
          const sessionDay = new Date(sessionDate.getFullYear(), sessionDate.getMonth(), sessionDate.getDate());

          if (sessionDay.getTime() === today.getTime()) {
            groups.today.push(session);
          } else if (sessionDay.getTime() === yesterday.getTime()) {
            groups.yesterday.push(session);
          } else if (sessionDay.getTime() > lastWeek.getTime() && sessionDay.getTime() < yesterday.getTime()) {
            groups.pastWeek.push(session);
          }
          // 超过7天的数据不显示
        });

        // 如果没有会话
        const totalCount = groups.today.length + groups.yesterday.length + groups.pastWeek.length;
        if (totalCount === 0) {
          const emptyDiv = document.createElement("div");
          emptyDiv.className = "session-dropdown-empty";
          emptyDiv.textContent = query ? "No sessions found" : "No sessions yet";
          sessionDropdownList.appendChild(emptyDiv);
          return;
        }

        // 创建分组渲染函数
        const renderGroup = (title, sessions) => {
          if (sessions.length === 0) return null;

          const groupDiv = document.createElement("div");
          groupDiv.className = "session-dropdown-group";

          const titleDiv = document.createElement("div");
          titleDiv.className = "session-dropdown-group-title";
          titleDiv.textContent = title;
          groupDiv.appendChild(titleDiv);

          sessions.forEach((session) => {
            const item = document.createElement("div");
            item.className = "session-dropdown-item";
            if (session.id === currentSessionId) {
              item.classList.add("active");
            }

            // 高亮搜索关键字
            const summary = session.summary || "Untitled";
            const highlightedSummary = query
              ? summary.replace(new RegExp(`(${escapeRegExp(query)})`, 'gi'), '<mark>$1</mark>')
              : summary;

            item.innerHTML = `
              <div class="session-dropdown-summary">${highlightedSummary}</div>
              <div class="session-dropdown-time">${formatSessionTime(session.updateTime)}</div>
            `;
            item.addEventListener("click", () => {
              sessionDropdown.classList.remove("show");
              sessionSelector.classList.remove("open");
              vscode.postMessage({ type: "selectSession", sessionId: session.id });
            });
            groupDiv.appendChild(item);
          });

          return groupDiv;
        };

        // 按顺序渲染分组
        const todayGroup = renderGroup("Today", groups.today);
        const yesterdayGroup = renderGroup("Yesterday", groups.yesterday);
        const pastWeekGroup = renderGroup("Past Week", groups.pastWeek);

        if (todayGroup) sessionDropdownList.appendChild(todayGroup);
        if (yesterdayGroup) sessionDropdownList.appendChild(yesterdayGroup);
        if (pastWeekGroup) sessionDropdownList.appendChild(pastWeekGroup);
      }

      function formatSessionTime(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const sessionDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

        // 计算天数差异
        const diffTime = today.getTime() - sessionDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) {
          // 今天，显示时间
          return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else {
          // 其他天，显示月/日
          const month = date.getMonth() + 1;
          const day = date.getDate();
          return `${month}/${day}`;
        }
      }

      function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function toggleSessionDropdown() {
        const isOpen = sessionDropdown.classList.toggle("show");
        sessionSelector.classList.toggle("open", isOpen);

        // 打开时清空搜索框并聚焦
        if (isOpen && sessionSearchInput) {
          sessionSearchInput.value = "";
          renderFilteredSessions("");
          // 延迟聚焦，确保下拉框已完全显示
          setTimeout(() => {
            sessionSearchInput.focus();
          }, 100);
        }
      }

      // 点击其他地方关闭下拉框
      document.addEventListener("click", (event) => {
        if (!sessionSelector.contains(event.target) && !sessionDropdown.contains(event.target)) {
          sessionDropdown.classList.remove("show");
          sessionSelector.classList.remove("open");
        }
      });

      // 按 Escape 关闭下拉框
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && sessionDropdown.classList.contains("show")) {
          sessionDropdown.classList.remove("show");
          sessionSelector.classList.remove("open");
        }
      });

      // 从状态恢复输入内容
      const savedState = vscode.getState();
      if (savedState && savedState.promptText) {
        promptInput.value = savedState.promptText || "";
        autoResizePrompt();
        updateSendIconState();
      }

      // 监听 visibilitychange 保存状态
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          vscode.setState({
            promptText: promptInput.value
          });
        }
      });

      promptInput.addEventListener("input", () => {
        exitHistoryBrowsing(); // any text modification exits history browsing mode
        autoResizePrompt();
        updateSendIconState();
        // 保存输入内容
        vscode.setState({
          promptText: promptInput.value
        });
      });

      updateSendIconState();
      autoResizePrompt();

      function sendUserPromptText(text, skills, imageUrls, options = {}) {
        const trimmed = (text || "").trim();
        const normalizedImages = Array.isArray(imageUrls) ? imageUrls.filter(Boolean) : [];
        const permissions = Array.isArray(options.permissions) ? options.permissions : undefined;
        const alwaysAllows = Array.isArray(options.alwaysAllows) ? options.alwaysAllows : undefined;
        const hasPermissionPayload = Boolean(
          (permissions && permissions.length > 0) || (alwaysAllows && alwaysAllows.length > 0)
        );
        if ((!trimmed && normalizedImages.length === 0 && !hasPermissionPayload) || sendButton.disabled) {
          return false;
        }

        historyCursor = -1;
        draftBeforeHistory = null;
        pendingUserPrompt = options.skipHistory ? null : trimmed || (normalizedImages.length > 0 ? "粘贴的图像" : "");

        vscode.postMessage({
          type: "userPrompt",
          prompt: trimmed,
          skills: skills && skills.length > 0 ? skills : undefined,
          images: normalizedImages.length > 0 ? normalizedImages : undefined,
          permissions,
          alwaysAllows
        });
        return true;
      }

      function sendPrompt() {
        // 如果正在处理，则中断（不检查输入框内容）
        if (isProcessing()) {
          vscode.postMessage({ type: "interrupt" });
          // 立即更新本地状态为 interrupted
          currentSessionStatus = "interrupted";
          setLoading(false, currentSessionStatus);
          return;
        }

        // 检查输入内容
        const text = promptInput.value.trim();
        const imageUrls = getAttachedImageUrls();
        if ((!text && imageUrls.length === 0) || sendButton.disabled) {
          return;
        }

        // 发送消息，不立即显示（等待后端返回渲染后的 HTML）
        promptInput.value = "";
        vscode.setState({ promptText: "" });
        autoResizePrompt();
        const permissionReply = pendingPermissionReply;
        const sent = sendUserPromptText(text, selectedSkills, imageUrls, permissionReply || {});
        if (!sent) {
          return;
        }
        pendingPermissionReply = null;
        renderPermissionPrompt();
        // 清空已选择的技能
        selectedSkills = [];
        attachmentManager?.clear();
        renderSkillsTags();
        updateSendIconState();
      }

      sessionSelector.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleSessionDropdown();
      });

      newSessionBtn.addEventListener("click", () => {
        sessionDropdown.classList.remove("show");
        sessionSelector.classList.remove("open");
        vscode.postMessage({ type: "createNewSession" });
        promptInput.value = "";
        inputHistory = [];
        historyCursor = -1;
        draftBeforeHistory = null;
        pendingUserPrompt = null;
        attachmentManager?.clear();
        autoResizePrompt();
        updateSendIconState();
      });

      sendButton.addEventListener("click", sendPrompt);
      promptInput.addEventListener("keydown", (event) => {
        // History navigation: only intercept ArrowUp/Down at the very start/end of the textarea.
        // Otherwise keep native cursor movement (line up/down).
        const noModifier = !event.shiftKey && !event.altKey && !event.ctrlKey && !event.metaKey;

        function isCaretCollapsedAtStart(el) {
          return el.selectionStart === 0 && el.selectionEnd === 0;
        }

        function isCaretCollapsedAtEnd(el) {
          const len = el.value.length;
          return el.selectionStart === len && el.selectionEnd === len;
        }

        function applyPromptValue(value, caret = "end") {
          promptInput.value = value;
          autoResizePrompt();
          vscode.setState({ promptText: promptInput.value });
          updateSendIconState();
          promptInput.focus();
          const len = promptInput.value.length;
          if (caret === "start") {
            promptInput.setSelectionRange(0, 0);
          } else {
            promptInput.setSelectionRange(len, len);
          }
        }

        // Exit history browsing mode on any non-ArrowUp/ArrowDown key
        if (historyCursor !== -1 && event.key !== "ArrowUp" && event.key !== "ArrowDown") {
          exitHistoryBrowsing();
          // fall through — let the key event continue normally (typing, Enter, Backspace, etc.)
        }

        function navigateHistory(direction) {
          if (!inputHistory || inputHistory.length === 0) {
            return;
          }

          // Enter history browsing mode
          if (historyCursor === -1) {
            draftBeforeHistory = promptInput.value;
            historyCursor = inputHistory.length; // virtual position after the last item
          }

          historyCursor += direction;

          // Clamp: [0..inputHistory.length]
          if (historyCursor < 0) historyCursor = 0;
          if (historyCursor > inputHistory.length) historyCursor = inputHistory.length;

          if (historyCursor === inputHistory.length) {
            // Restore draft and exit history mode
            applyPromptValue(draftBeforeHistory ?? "", "end");
            historyCursor = -1;
            draftBeforeHistory = null;
            return;
          }

          // ArrowUp-triggered navigation is more convenient with caret at start for repeated browsing.
          applyPromptValue(inputHistory[historyCursor] ?? "", direction < 0 ? "start" : "end");
        }

        if (event.key === "Enter") {
          if (event.isComposing) {
            // 输入法组合中（如中文输入法选字），不处理回车
            return;
          }
          if (event.shiftKey) {
            // Shift+回车：允许换行（默认行为）
            return;
          } else {
            // 回车：发送消息
            event.preventDefault();
            sendPrompt();
          }
        } else if (event.key === "ArrowUp" && noModifier) {
          if ((historyCursor !== -1 || isCaretCollapsedAtStart(promptInput)) && inputHistory.length > 0) {
            event.preventDefault();
            navigateHistory(-1);
          }
        } else if (event.key === "ArrowDown" && noModifier) {
          // Only navigate forward if we're already in history browsing mode
          if (historyCursor !== -1 || isCaretCollapsedAtEnd(promptInput)) {
            event.preventDefault();
            navigateHistory(1);
          }
        }
      });

      function addMessageBubble(msg, shouldConnect) {
        if (msg.role === "system") {
          addBubble(msg.content, "system", msg.meta, shouldConnect);
        } else if (msg.role === "user") {
          addBubble(msg.content, "user", msg.meta, false);
        } else if (msg.role === "assistant") {
          addBubble(msg.html || msg.content, "assistant", msg.meta, shouldConnect, msg.content || "");
        } else if (msg.role === "tool") {
          addBubble(msg.content, "tool", msg.meta, shouldConnect);
        }
      }

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (message.type === "initializeEmpty") {
          // 初始化空聊天
          clearMessages();
          if (sessionSelectorTitleText) {
            sessionSelectorTitleText.textContent = "New Conversation";
          }
          currentSessionId = null;
          currentSessionStatus = message.status || null;
          currentAskPermissions = [];
          permissionPromptState = null;
          pendingPermissionReply = null;
          updateContextMeter(message.tokenTelemetry);
          attachmentManager?.clear();
          setLoading(false, currentSessionStatus);

          // Reset history for new conversation
          inputHistory = [];
          historyCursor = -1;
          draftBeforeHistory = null;
          pendingUserPrompt = null;
          // 如果消息中包含sessions，更新下拉框
          if (message.sessions && Array.isArray(message.sessions)) {
            updateSessionDropdown(message.sessions);
          } else if (allSessions.length > 0) {
            updateSessionDropdown(allSessions);
          }
        } else if (message.type === "loadSession") {
          // 加载已有对话
          currentSessionId = message.sessionId;
          currentSessionStatus = message.status || null;
          currentAskPermissions = normalizeAskPermissions(message.askPermissions);
          permissionPromptState = null;
          pendingPermissionReply = null;
          updateContextMeter(message.tokenTelemetry);
          if ('processes' in message) {
            currentRunningProcesses = message.processes;
          } else {
            currentRunningProcesses = null;
          }
          attachmentManager?.clear();
          clearMessages();
          if (sessionSelectorTitleText) {
            sessionSelectorTitleText.textContent = message.summary;
          }

          // 加载历史消息
          if (message.messages && Array.isArray(message.messages)) {
            // Rebuild user input history from session messages
            inputHistory = message.messages
              .filter((m) => m && m.role === "user" && typeof m.content === "string")
              .map((m) => m.content)
              .filter((t) => t && t.trim());
            historyCursor = -1;
            draftBeforeHistory = null;
            pendingUserPrompt = null;

            message.messages.forEach((msg, index) => {
              // 判断是否需要连接到上一个消息
              let shouldConnect = false;
              if (index > 0) {
                const prevMsg = message.messages[index - 1];
                shouldConnect = prevMsg.role !== "user" && msg.role !== "user";
              }
              addMessageBubble(msg, shouldConnect);
            });

            // 更新 lastMessageRole 为最后一条消息的role
            if (message.messages.length > 0) {
              lastMessageRole = message.messages[message.messages.length - 1].role;
            }

            // 批量更新所有连接线的高度
            requestAnimationFrame(() => {
              updateAllConnectionLines();
            });

            // 找最后一条 asThinking 为 true 的消息并展开
            const thinkingBubbles = messages.querySelectorAll('.bubble.assistant[data-thinking="true"]');
            if (thinkingBubbles.length > 0) {
              const lastThinkingBubble = thinkingBubbles[thinkingBubbles.length - 1];
              if (currentThinkingBubble && currentThinkingBubble !== lastThinkingBubble) {
                setThinkingBubbleExpanded(currentThinkingBubble, false);
              }
              setThinkingBubbleExpanded(lastThinkingBubble, true);
              currentThinkingBubble = lastThinkingBubble;
            }
          }

          // 设置会话状态
          const isCurrentlyProcessing = isBusyStatus(currentSessionStatus);
          setLoading(isCurrentlyProcessing, currentSessionStatus);
          renderPermissionPrompt();

          // 如果消息中包含sessions，更新下拉框
          if (message.sessions && Array.isArray(message.sessions)) {
            updateSessionDropdown(message.sessions);
          } else if (allSessions.length > 0) {
            updateSessionDropdown(allSessions);
          }
        } else if (message.type === "showSessionsList") {
          // 更新对话列表下拉框
          updateSessionDropdown(message.sessions || []);
        } else if (message.type === "sessionStatus") {
          if (message.sessionId && currentSessionId && message.sessionId !== currentSessionId) {
            return;
          }
          const nextStatus = message.status || null;
          if ('askPermissions' in message) {
            currentAskPermissions = normalizeAskPermissions(message.askPermissions);
            if (nextStatus !== "ask_permission") {
              permissionPromptState = null;
            }
          }
          if ('processes' in message) {
            currentRunningProcesses = message.processes;
          }
          if ('tokenTelemetry' in message) {
            updateContextMeter(message.tokenTelemetry);
          }
          setLoading(isBusyStatus(nextStatus), nextStatus);
          renderPermissionPrompt();
        } else if (message.type === "llmStreamProgress") {
          const progress = message.progress || null;
          if (!progress || !progress.requestId) {
            return;
          }
          if (progress.sessionId && currentSessionId && progress.sessionId !== currentSessionId) {
            return;
          }
          if (progress.phase === "end") {
            if (currentLlmStreamProgress && currentLlmStreamProgress.requestId === progress.requestId) {
              currentLlmStreamProgress = null;
            }
          } else {
            currentLlmStreamProgress = progress;
          }
          updateThinkingBubbleContent();
        } else if (message.type === "userMessage") {
          // 显示用户消息（纯文本）
          addBubble(message.content || "", "user", message.meta, false);

          // Record user message into history
          if (typeof message.content === "string") {
            // Inline helper to avoid hoisting issues: duplicate minimal recording logic
            const text = message.content;
            const now = Date.now();
            if (pendingUserPrompt !== null && text === pendingUserPrompt) {
              inputHistory.push(text);
              pendingUserPrompt = null;
              lastHistoryRecordText = text;
              lastHistoryRecordAt = now;
            } else if (!(text === lastHistoryRecordText && (now - lastHistoryRecordAt) < 500) && text.trim()) {
              inputHistory.push(text);
              lastHistoryRecordText = text;
              lastHistoryRecordAt = now;
              pendingUserPrompt = null;
            }
          }
        } else if (message.type === "assistant") {
          // 接收助手回复
          const shouldConnect = lastMessageRole !== null && lastMessageRole !== "user";
          addBubble(message.html || message.content || "", "assistant", message.meta, shouldConnect, message.content || "");
        } else if (message.type === "loading") {
          // 加载状态
          const newStatus = message.value ? "processing" : currentSessionStatus;
          setLoading(Boolean(message.value), newStatus);
        } else if(message.type === "appendMessage") {
          // 新增消息
          addMessageBubble(message.message, message.shouldConnect);

          // Record appended user message into history (when backend sends user messages via appendMessage)
          if (message.message && message.message.role === "user" && typeof message.message.content === "string") {
            const text = message.message.content;
            const now = Date.now();
            if (pendingUserPrompt !== null && text === pendingUserPrompt) {
              inputHistory.push(text);
              pendingUserPrompt = null;
              lastHistoryRecordText = text;
              lastHistoryRecordAt = now;
            } else if (!(text === lastHistoryRecordText && (now - lastHistoryRecordAt) < 500) && text.trim()) {
              inputHistory.push(text);
              lastHistoryRecordText = text;
              lastHistoryRecordAt = now;
              pendingUserPrompt = null;
            }
          }

          // 如果是普通 assistant 消息（不是思考），说明本轮回复已完成，标记为 completed
          if (message.message.role === "assistant" && message.message.meta?.asThinking !== true) {
            currentSessionStatus = "completed";
            setLoading(false, currentSessionStatus);
          }

          // 如果是新的 asThinking 为 true 的消息，展开最新的思考气泡
          if (message.message.role === "assistant" && message.message.meta?.asThinking === true) {
            // 找最后一条 thinking 气泡
            const thinkingBubbles = messages.querySelectorAll('.bubble.assistant[data-thinking="true"]');
            if (thinkingBubbles.length > 0) {
              const lastThinkingBubble = thinkingBubbles[thinkingBubbles.length - 1];
              if (currentThinkingBubble && currentThinkingBubble !== lastThinkingBubble) {
                setThinkingBubbleExpanded(currentThinkingBubble, false);
              }
              setThinkingBubbleExpanded(lastThinkingBubble, true);
              currentThinkingBubble = lastThinkingBubble;
            }
          }
        } else if (message.type === "skillsList") {
          // 接收可用技能列表
          availableSkills = message.skills || [];
          updateSkillsButtonTooltip();
        }
      });

      // 监听窗口大小变化，重新计算连接线
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          updateAllConnectionLines();
        }, 100);
      });

      // webview 准备就绪，请求初始数据
      vscode.postMessage({ type: "ready" });

      // 请求可用技能列表
      vscode.postMessage({ type: "requestSkills" });
    </script>
  </body>
</html>
